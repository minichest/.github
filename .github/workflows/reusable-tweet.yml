name: Auto Post to X via Buffer

on:
  workflow_call:
    inputs:
      commit_msg:
        required: true
        type: string
      commit_url:
        required: true
        type: string
  push:
    branches:
      - main

jobs:
  send-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Post to X via Buffer Python Script
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          CHANNEL_ID: ${{ secrets.BUFFER_PROFILE_ID }}
          COMMIT_MSG: ${{ inputs.commit_msg || github.event.head_commit.message }}
          COMMIT_URL: ${{ inputs.commit_url || github.event.head_commit.url }}
        run: |
          python -c '
          import os
          import sys
          import json
          import requests

          # 1. Fetch our environment variables safely
          token = os.environ.get("BUFFER_TOKEN", "")
          channel_id = os.environ.get("CHANNEL_ID", "")
          commit_msg = os.environ.get("COMMIT_MSG", "")
          commit_url = os.environ.get("COMMIT_URL", "")

          # 2. Extract only the very first line of the commit text
          first_line = commit_msg.split("\n")[0] if commit_msg else ""
          full_text = f"🚀 Code Update: '"'{first_line}'"'\n\nCheck it out: {commit_url}"

          # 3. Assemble our clean type-safe payload according to Buffer rules
          query = """
          mutation CreatePost($input: CreatePostInput!) {
            createPost(input: $input) {
              ... on PostActionSuccess {
                post { id }
              }
              ... on MutationError {
                message
              }
            }
          }
          """
          
          variables = {
              "input": {
                  "channelId": channel_id,
                  "text": full_text,
                  "schedulingType": "automatic",
                  "mode": "addToQueue"
              }
          }

          payload = {"query": query, "variables": variables}

          # 4. Fire the clean POST request directly to the API endpoint
          headers = {
              "Content-Type": "application/json",
              "Authorization": f"Bearer {token}"
          }
          
          response = requests.post("https://api.buffer.com/", json=payload, headers=headers)

          # 5. Output server diagnostics directly into your GitHub Actions view log
          print("==== BUFFER RESPONSE DATA ====")
          print(f"Status Code: {response.status_code}")
          print(response.text)
          print("==============================")

          # Force an explicit exit 1 crash tracking if errors return
          if "errors" in response.text or "MutationError" in response.text or response.status_code != 200:
              sys.exit(1)
          '
