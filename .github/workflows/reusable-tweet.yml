name: Reusable Buffer Tweet

on:
  workflow_call:
    inputs:
      commit_msg:
        required: true
        type: string
      commit_url:
        required: true
        type: string

jobs:
  send-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Format and Post to X via Buffer
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          CHANNEL_ID: ${{ secrets.BUFFER_PROFILE_ID }}
        run: |
          FIRST_LINE=$(echo "${{ inputs.commit_msg }}" | head -n 1)

          read -r -d '' FULL_TEXT << EOM
          🚀 Code Update: '${FIRST_LINE}'

          Check it out: ${{ inputs.commit_url }}
          EOM

          PAYLOAD=$(jq -n \
            --arg chan "$CHANNEL_ID" \
            --arg text "$FULL_TEXT" \
            '{
              query: "mutation CreatePost($input: CreatePostInput!) { createPost(input: $input) { ... on PostActionSuccess { post { id } } ... on MutationError { message } } }",
              variables: {
                input: {
                  channelId: $chan,
                  text: $text,
                  schedulingType: "automatic",
                  mode: "addToQueue"
                }
              }
            }')

          # 💡 Saving the raw response to a variable instead of dropping it silently
          RESPONSE=$(curl -s -X POST "https://api.buffer.com/" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BUFFER_TOKEN" \
            -d "$PAYLOAD")

          # 📢 Printing the exact text directly onto your GitHub console log!
          echo "==== BUFFER RESPONSE DATA ===="
          echo "$RESPONSE"
          echo "=============================="

          # Gracefully exits with an error code if the payload failed
          if [[ "$RESPONSE" == *'"errors"'* || "$RESPONSE" == *'"MutationError"'* ]]; then
            exit 1
          fi
