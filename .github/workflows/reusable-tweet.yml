name: Auto Post to X via Buffer

on:
  workflow_call:
    # 🔓 Unlocks the secret gate when called reusably from other repositories!
    secrets:
      BUFFER_ACCESS_TOKEN:
        required: true
      BUFFER_PROFILE_ID:
        required: true
    inputs:
      commit_msg:
        required: true
        type: string
      commit_url:
        required: true
        type: string
  push:
    branches:
      - main

jobs:
  send-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Format and Post to X via Buffer
        env:
          # 💡 Uses the passed workflow secrets if called from another repo, otherwise falls back to local repository secrets!
          BUFFER_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN || secrets.BUFFER_ACCESS_TOKEN }}
          CHANNEL_ID: ${{ secrets.BUFFER_PROFILE_ID || secrets.BUFFER_PROFILE_ID }}
          COMMIT_MSG: ${{ inputs.commit_msg || github.event.head_commit.message }}
          COMMIT_URL: ${{ inputs.commit_url || github.event.head_commit.url }}
        run: |
          # 1. Grab only the very first line of the commit message cleanly
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -n 1)

          # 2. Assemble the full text template natively with real line breaks
          read -r -d '' FULL_TEXT << EOM
          🚀 Code Update: '${FIRST_LINE}'

          Check it out: ${COMMIT_URL}
          EOM

          # 3. Construct a standard GraphQL payload with variables mapping
          PAYLOAD=$(jq -n \
            --arg chan "$CHANNEL_ID" \
            --arg text "$FULL_TEXT" \
            '{
              query: "mutation CreatePost($input: CreatePostInput!) { createPost(input: $input) { ... on PostActionSuccess { post { id } } ... on MutationError { message } } }",
              variables: {
                input: {
                  channelId: $chan,
                  text: $text,
                  schedulingType: "automatic",
                  mode: "addToQueue"
                }
              }
            }')

          # 4. Fire the modern GraphQL query payload to Buffer's active live API endpoint URL
          RESPONSE=$(curl -s -X POST "https://api.buffer.com/" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BUFFER_TOKEN" \
            -d "$PAYLOAD")

          echo "==== BUFFER RESPONSE DATA ===="
          echo "$RESPONSE"
          echo "=============================="

          # 5. Explicitly force a script runner crash if Buffer replies with error definitions
          if [[ -z "$RESPONSE" || "$RESPONSE" == *'"errors"'* || "$RESPONSE" == *'"MutationError"'* ]]; then
            exit 1
          fi
