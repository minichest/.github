name: Reusable Buffer Tweet

on:
  workflow_call:
    inputs:
      commit_msg:
        required: true
        type: string
      commit_url:
        required: true
        type: string

jobs:
  send-tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Format and Post to X via Buffer
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          CHANNEL_ID: ${{ secrets.BUFFER_PROFILE_ID }}
        run: |
          # 1. Grab only the very first line of the commit message cleanly
          FIRST_LINE=$(echo "${{ inputs.commit_msg }}" | head -n 1)

          # 2. Assemble the full text template natively with real line breaks
          read -r -d '' FULL_TEXT << EOM
          🚀 Code Update: '${FIRST_LINE}'

          Check it out: ${{ inputs.commit_url }}
          EOM

          # 3. Construct a valid GraphQL payload matching Buffer's schema rules exactly
          PAYLOAD=$(jq -n \
            --arg chan "$CHANNEL_ID" \
            --arg text "$FULL_TEXT" \
            '{
              query: "mutation CreatePost($chan: ChannelId!, $text: String!) { createPost(input: { channelId: $chan, text: $text, schedulingType: automatic, mode: addToQueue }) { ... on PostActionSuccess { post { id } } ... on MutationError { message } } }", 
              variables: { chan: $chan, text: $text }
            }')

          # 4. Fire the modern GraphQL query payload to Buffer's active live API endpoint URL
          curl -X POST "https://api.buffer.com/" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $BUFFER_TOKEN" \
            -d "$PAYLOAD"
